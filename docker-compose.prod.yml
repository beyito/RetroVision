version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: retrovision-redis-prod
    restart: always
    expose:
      - "6379"
    networks:
      - retrovision-net-prod

  mosquitto:
    image: eclipse-mosquitto:1.6.15
    container_name: retrovision-mosquitto-prod
    restart: always
    ports:
      - "1883:1883"
    networks:
      - retrovision-net-prod

  web:
    build: ./backend
    container_name: retrovision-web-prod
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 retrovision_core.asgi:application
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=*
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mosquitto
    networks:
      - retrovision-net-prod

  mqtt_worker:
    build: ./backend
    container_name: retrovision-mqtt-worker-prod
    restart: always
    command: python manage.py listen_mqtt
    volumes:
      - ./backend:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mosquitto
    networks:
      - retrovision-net-prod

  frontend:
    build:
      context: ./retrovision_web
      dockerfile: Dockerfile
    container_name: retrovision-frontend-prod
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - web
    networks:
      - retrovision-net-prod

networks:
  retrovision-net-prod:
    name: retrovision-net-prod
    driver: bridge
